name = "agile-productions-api"
main = "src/index.js"
compatibility_date = "2025-12-22"
compatibility_flags = ["nodejs_compat"]
account_id = "a80eabbb536a884ecd8ba3dc123bee10"

# Enable observability
[observability]
enabled = true

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "agile-productions-db"
database_id = "c6a1baab-390d-4798-8b02-8aa500642fd7"

# R2 Storage binding
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "agile-productions-assets"

# Environment variables
# CORS allowlist — production domains, plus the Next.js preview Worker origin so
# the not-yet-cutover preview (agile-productions-web.workers.dev) can call the API
# from the browser. For local development, add localhost origins via
# workers/.dev.vars (gitignored), e.g.:
#   ALLOWED_ORIGINS="https://agileproductions.in,https://agileproductions.ae,http://localhost:5173,http://localhost:3000"
# `wrangler dev` gives .dev.vars precedence, so localhost is never shipped to prod.
# Remove the *.workers.dev preview origin after the domain cutover.
[vars]
ALLOWED_ORIGINS = "https://agileproductions.in,https://agileproductions.ae,https://agile-productions-web.cool-bonus-e67f.workers.dev"

# Note: JWT_SECRET should be set as a Cloudflare secret, not in this file
# Run: npx wrangler secret put JWT_SECRET

# Cron trigger for daily cleanup of old activity logs
[triggers]
crons = ["0 2 * * *"]  # Run daily at 2 AM UTC
