name: Frontend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint || echo "No linter configured"
        continue-on-error: true

      - name: Build frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.VITE_API_URL }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/.next
          retention-days: 1

  deploy:
    name: Deploy to Cloudflare
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      deployments: write
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # OpenNext runs `next build` internally, so the NEXT_PUBLIC_* env must be
      # present HERE — that's the build whose output actually gets deployed.
      - name: Build for Cloudflare (OpenNext)
        run: npx opennextjs-cloudflare build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.VITE_API_URL }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Deploy to Cloudflare Workers
        run: npx opennextjs-cloudflare deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Purge the edge cache after deploy so freshly published HTML is served
      # immediately. Hashed static assets/images keep their long cache (each
      # build/upload gets a new URL), so a full purge only forces HTML and
      # API-backed pages to refetch.
      #
      # Dynamically purges EVERY zone in the account whose name contains
      # ZONE_NAME_FILTER, so any future agileproductions.* zone is covered
      # automatically with no workflow change. The name filter keeps us from
      # touching unrelated zones that share this Cloudflare account.
      # Requires the API token to have Zone:Read (to list zones) + Cache Purge.
      - name: Purge Cloudflare edge cache (all matching zones)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ZONE_NAME_FILTER: agileproductions
        run: |
          set -euo pipefail
          api="https://api.cloudflare.com/client/v4"
          auth="Authorization: Bearer ${CLOUDFLARE_API_TOKEN}"

          # Gather matching zone IDs for this account across all result pages.
          zone_ids=""
          page=1
          while :; do
            resp=$(curl -fsS "${api}/zones?account.id=${CLOUDFLARE_ACCOUNT_ID}&per_page=50&page=${page}" -H "$auth")
            if [ "$(echo "$resp" | jq -r '.success')" != "true" ]; then
              echo "::error::Failed to list zones: $(echo "$resp" | jq -c '.errors')"
              exit 1
            fi
            ids=$(echo "$resp" | jq -r --arg f "$ZONE_NAME_FILTER" '.result[] | select(.name | contains($f)) | .id')
            [ -n "$ids" ] && zone_ids="${zone_ids} ${ids}"
            total=$(echo "$resp" | jq -r '.result_info.total_pages')
            [ "$page" -ge "$total" ] && break
            page=$((page + 1))
          done

          if [ -z "${zone_ids// /}" ]; then
            echo "No zones matched \"${ZONE_NAME_FILTER}\" — nothing to purge."
            exit 0
          fi

          for z in $zone_ids; do
            echo "Purging zone ${z}"
            curl -fsS -X POST "${api}/zones/${z}/purge_cache" \
              -H "$auth" -H "Content-Type: application/json" \
              --data '{"purge_everything":true}' \
              || echo "::warning::Cache purge failed for zone ${z}"
          done

      - name: Notify deployment success
        if: success()
        run: echo "✅ Frontend deployed successfully!"

      - name: Notify deployment failure
        if: failure()
        run: echo "❌ Frontend deployment failed!"

  e2e-tests:
    name: E2E Tests
    needs: build-and-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      # E2E is a hermetic frontend smoke test — it must not depend on or touch
      # the production API. The home route is dynamic (`headers()`), so the build
      # never calls the API; at runtime, fetches to this unused local URL fail
      # fast and the components render with empty content, which is all the
      # smoke tests assert on.
      - name: Build frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8787

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload test videos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-videos
          path: frontend/test-results/
          retention-days: 7
